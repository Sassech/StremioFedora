name: Build and Release Stremio RPM

on:
  schedule:
    - cron: "0 0 1 */2 *"
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: stremio-builder:fedora

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HOST_UID=1000
            HOST_GID=1000

      - name: Run build
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ${{ env.IMAGE_NAME }}

      - name: Get version
        id: version
        run: |
          RPM_FILE=$(find output -name "*.rpm" -type f | head -n 1)
          VERSION=$(echo "$RPM_FILE" | grep -oP 'stremio-\K[0-9.]+-[0-9]+' | sed 's/-/./' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT

      - name: Check release
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.version.outputs.rpm_file }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-rpm
          path: output/*.rpm
          retention-days: 30
